<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunny.io</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        .game-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;
            color: #fff;
        }
        .game-header h1 { font-size: 22px; }
        .score-display {
            background: rgba(255,255,255,0.1);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #fff;
        }
        .back-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        canvas {
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            cursor: none;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.7);
            color: #fff;
            z-index: 10;
        }
        #overlay.hidden { display: none; }
        #overlay h2 { font-size: 32px; margin-bottom: 10px; }
        #overlay p { font-size: 16px; margin-bottom: 6px; opacity: 0.8; }
        .play-btn {
            margin-top: 20px;
            padding: 12px 36px;
            font-size: 18px;
            background: linear-gradient(135deg, #6ECF9A, #4facfe);
            border: none;
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.15s;
        }
        .play-btn:hover { transform: scale(1.05); }
        .controls-hint {
            margin-top: 12px;
            font-size: 13px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <a href="{{ url_for('games') }}" class="back-btn">← Back</a>

    <div class="game-header">
        <h1>{{ bunny.emoji }} {{ bunny.name }}.io</h1>
        <div class="score-display">Territory: <span id="score">0</span>%</div>
        <div class="score-display">Best: <span id="best">0</span>%</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="overlay">
        <h2>{{ bunny.emoji }} {{ bunny.name }}.io</h2>
        <p>Conquer territory with your bunny!</p>
        <p>Leave your zone, draw a loop, and return to claim land.</p>
        <button class="play-btn" id="playBtn">Play</button>
        <div class="controls-hint">WASD / Arrow Keys or Mouse to move</div>
    </div>

    <script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const playBtn = document.getElementById('playBtn');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');

        // Grid config
        const CELL = 16;
        const COLS = 50;
        const ROWS = 38;
        canvas.width = COLS * CELL;
        canvas.height = ROWS * CELL;

        // Colors from the selected bunny
        const BUNNY_COLOR = '{{ bunny.color }}';
        const BUNNY_NAME = '{{ bunny.name }}';
        const BUNNY_IMAGE = '{{ url_for("static", filename=bunny.image) }}';

        // Load bunny sprite
        const bunnyImg = new Image();
        bunnyImg.src = BUNNY_IMAGE;

        // Game state
        let grid;          // 0 = empty, 1 = player territory, 2 = enemy territory, 3 = trail
        let player;
        let enemies;
        let trail;
        let gameRunning = false;
        let animId;
        let lastTick = 0;
        let bestScore = 0;
        const TICK_MS = 80;

        // Direction: 0=up, 1=right, 2=down, 3=left
        const DX = [0, 1, 0, -1];
        const DY = [-1, 0, 1, 0];

        // Enemy colors
        const ENEMY_COLORS = [
            {fill: '#FF6B6B', trail: '#ff9999', name: 'Ruby'},
            {fill: '#845EC2', trail: '#b39ddb', name: 'Plum'},
            {fill: '#FF9671', trail: '#ffbb99', name: 'Peach'},
        ];

        function initGame() {
            grid = Array.from({length: ROWS}, () => new Uint8Array(COLS));

            // Player starts with a small square of territory in the center
            const cx = Math.floor(COLS / 2);
            const cy = Math.floor(ROWS / 2);
            for (let y = cy - 2; y <= cy + 2; y++) {
                for (let x = cx - 2; x <= cx + 2; x++) {
                    if (y >= 0 && y < ROWS && x >= 0 && x < COLS) grid[y][x] = 1;
                }
            }

            player = { x: cx, y: cy, dir: -1, alive: true };
            trail = [];

            // Init enemies
            enemies = ENEMY_COLORS.map((c, i) => {
                const ex = i === 0 ? 5 : i === 1 ? COLS - 6 : Math.floor(COLS / 2);
                const ey = i === 0 ? 5 : i === 1 ? ROWS - 6 : 5;
                // Give each enemy a small starting territory
                for (let y = ey - 2; y <= ey + 2; y++) {
                    for (let x = ex - 2; x <= ex + 2; x++) {
                        if (y >= 0 && y < ROWS && x >= 0 && x < COLS && grid[y][x] === 0) {
                            grid[y][x] = 10 + i;
                        }
                    }
                }
                return {
                    x: ex, y: ey, dir: Math.floor(Math.random() * 4),
                    trail: [], alive: true, color: c, id: 10 + i,
                    turnTimer: 0
                };
            });
        }

        // Input
        let inputDir = -1;
        let mouseTarget = null;

        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': inputDir = 0; mouseTarget = null; break;
                case 'ArrowRight': case 'd': case 'D': inputDir = 1; mouseTarget = null; break;
                case 'ArrowDown': case 's': case 'S': inputDir = 2; mouseTarget = null; break;
                case 'ArrowLeft': case 'a': case 'A': inputDir = 3; mouseTarget = null; break;
            }
            e.preventDefault();
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            mouseTarget = {
                x: Math.floor((e.clientX - rect.left) / CELL),
                y: Math.floor((e.clientY - rect.top) / CELL)
            };
        });

        canvas.addEventListener('mouseleave', () => { mouseTarget = null; });

        function dirFromMouse() {
            if (!mouseTarget) return player.dir;
            const dx = mouseTarget.x - player.x;
            const dy = mouseTarget.y - player.y;
            if (Math.abs(dx) < 1 && Math.abs(dy) < 1) return player.dir;
            if (Math.abs(dx) > Math.abs(dy)) {
                return dx > 0 ? 1 : 3;
            } else {
                return dy > 0 ? 2 : 0;
            }
        }

        // Flood fill to capture territory
        function captureTerritory() {
            if (trail.length === 0) return;

            // Mark trail cells as player territory
            for (const t of trail) {
                grid[t.y][t.x] = 1;
            }
            trail = [];

            // Flood fill from edges to find outside cells
            const visited = Array.from({length: ROWS}, () => new Uint8Array(COLS));

            // BFS from all border cells that are NOT player territory
            const queue = [];
            for (let x = 0; x < COLS; x++) {
                if (grid[0][x] !== 1) { queue.push([x, 0]); visited[0][x] = 1; }
                if (grid[ROWS-1][x] !== 1) { queue.push([x, ROWS-1]); visited[ROWS-1][x] = 1; }
            }
            for (let y = 0; y < ROWS; y++) {
                if (grid[y][0] !== 1) { queue.push([0, y]); visited[y][0] = 1; }
                if (grid[y][COLS-1] !== 1) { queue.push([COLS-1, y]); visited[y][COLS-1] = 1; }
            }

            let head = 0;
            while (head < queue.length) {
                const [cx, cy] = queue[head++];
                for (let d = 0; d < 4; d++) {
                    const nx = cx + DX[d], ny = cy + DY[d];
                    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !visited[ny][nx] && grid[ny][nx] !== 1) {
                        visited[ny][nx] = 1;
                        queue.push([nx, ny]);
                    }
                }
            }

            // Any unvisited, non-player cell is enclosed -> claim it
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (!visited[y][x] && grid[y][x] !== 1) {
                        grid[y][x] = 1;
                    }
                }
            }
        }

        function countTerritory(id) {
            let count = 0;
            for (let y = 0; y < ROWS; y++)
                for (let x = 0; x < COLS; x++)
                    if (grid[y][x] === id) count++;
            return count;
        }

        function updateScore() {
            const total = COLS * ROWS;
            const pct = Math.round((countTerritory(1) / total) * 100);
            scoreEl.textContent = pct;
            if (pct > bestScore) {
                bestScore = pct;
                bestEl.textContent = pct;
            }
        }

        // Enemy AI
        function updateEnemy(e) {
            if (!e.alive) return;

            e.turnTimer--;
            const onOwn = grid[e.y][e.x] === e.id;
            const trailLen = e.trail.length;

            // Decide direction
            if (trailLen > 12 + Math.random() * 8 || (trailLen > 4 && Math.random() < 0.05)) {
                // Try to head home
                let bestDir = e.dir;
                let bestDist = Infinity;
                for (let d = 0; d < 4; d++) {
                    // Don't reverse
                    if (d === (e.dir + 2) % 4 && trailLen > 0) continue;
                    const nx = e.x + DX[d], ny = e.y + DY[d];
                    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
                    // Find nearest own territory
                    for (let r = 1; r < 10; r++) {
                        const sx = e.x + DX[d] * r, sy = e.y + DY[d] * r;
                        if (sx >= 0 && sx < COLS && sy >= 0 && sy < ROWS && grid[sy][sx] === e.id) {
                            if (r < bestDist) { bestDist = r; bestDir = d; }
                            break;
                        }
                    }
                }
                e.dir = bestDir;
            } else if (e.turnTimer <= 0) {
                // Random turn
                const choices = [];
                for (let d = 0; d < 4; d++) {
                    if (d === (e.dir + 2) % 4 && trailLen > 0) continue;
                    const nx = e.x + DX[d], ny = e.y + DY[d];
                    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) choices.push(d);
                }
                if (choices.length) e.dir = choices[Math.floor(Math.random() * choices.length)];
                e.turnTimer = 4 + Math.floor(Math.random() * 8);
            }

            const nx = e.x + DX[e.dir], ny = e.y + DY[e.dir];

            // Boundary check - bounce
            if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) {
                e.dir = (e.dir + 1) % 4;
                return;
            }

            // Check if hits own trail -> die
            if (e.trail.some(t => t.x === nx && t.y === ny)) {
                e.alive = false;
                for (const t of e.trail) grid[t.y][t.x] = 0;
                e.trail = [];
                // Respawn after a delay
                setTimeout(() => respawnEnemy(e), 3000);
                return;
            }

            // Check if hits player trail -> player dies
            if (grid[ny][nx] === 3) {
                playerDeath();
                return;
            }

            // Move
            const wasOnOwn = grid[e.y][e.x] === e.id;
            e.x = nx;
            e.y = ny;
            const nowOnOwn = grid[ny][nx] === e.id;

            if (!nowOnOwn) {
                // Leaving territory - add to trail
                if (grid[ny][nx] !== 20 + enemies.indexOf(e)) {
                    e.trail.push({x: nx, y: ny});
                    grid[ny][nx] = 20 + enemies.indexOf(e); // enemy trail marker
                }
            } else if (e.trail.length > 0) {
                // Returned to own territory - capture
                enemyCapture(e);
            }
        }

        function enemyCapture(e) {
            const idx = enemies.indexOf(e);
            for (const t of e.trail) {
                grid[t.y][t.x] = e.id;
            }
            e.trail = [];
            // Simple: don't do full flood fill for enemies to keep performance
        }

        function respawnEnemy(e) {
            const corners = [{x:5,y:5},{x:COLS-6,y:5},{x:5,y:ROWS-6},{x:COLS-6,y:ROWS-6}];
            const c = corners[Math.floor(Math.random() * corners.length)];
            e.x = c.x; e.y = c.y;
            e.alive = true;
            e.dir = Math.floor(Math.random() * 4);
            e.trail = [];
            // Small territory
            for (let y = c.y - 2; y <= c.y + 2; y++) {
                for (let x = c.x - 2; x <= c.x + 2; x++) {
                    if (y >= 0 && y < ROWS && x >= 0 && x < COLS && grid[y][x] === 0) {
                        grid[y][x] = e.id;
                    }
                }
            }
        }

        function playerDeath() {
            player.alive = false;
            // Clear trail
            for (const t of trail) {
                if (grid[t.y][t.x] === 3) grid[t.y][t.x] = 0;
            }
            trail = [];
            gameRunning = false;
            cancelAnimationFrame(animId);
            updateScore();

            // Show game over
            overlay.classList.remove('hidden');
            overlay.querySelector('h2').textContent = 'Game Over!';
            overlay.querySelector('p').textContent = `You conquered ${scoreEl.textContent}% of the map!`;
            playBtn.textContent = 'Play Again';
        }

        // Main update
        function tick() {
            if (!player.alive) return;

            // Determine direction
            let dir = inputDir;
            if (mouseTarget) dir = dirFromMouse();
            if (dir === -1) return; // not moving yet

            // Prevent reversing into own trail
            if (trail.length > 0 && dir === (player.dir + 2) % 4) {
                dir = player.dir;
            }
            player.dir = dir;

            const nx = player.x + DX[dir];
            const ny = player.y + DY[dir];

            // Boundary -> death
            if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) {
                playerDeath();
                return;
            }

            // Hit own trail -> death
            if (grid[ny][nx] === 3) {
                playerDeath();
                return;
            }

            // Hit enemy trail -> kill that enemy
            for (let i = 0; i < enemies.length; i++) {
                if (grid[ny][nx] === 20 + i) {
                    enemies[i].alive = false;
                    for (const t of enemies[i].trail) grid[t.y][t.x] = 0;
                    enemies[i].trail = [];
                    setTimeout(() => respawnEnemy(enemies[i]), 3000);
                }
            }

            const wasOnOwn = grid[player.y][player.x] === 1;
            player.x = nx;
            player.y = ny;
            const nowOnOwn = grid[ny][nx] === 1;

            if (!nowOnOwn) {
                // Outside own territory - leave trail
                trail.push({x: nx, y: ny});
                grid[ny][nx] = 3;
            } else if (trail.length > 0) {
                // Returned to own territory - capture!
                captureTerritory();
                updateScore();
            }

            // Update enemies
            for (const e of enemies) updateEnemy(e);
        }

        // Render
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Background
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid lines (subtle)
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 0.5;
            for (let x = 0; x <= COLS; x++) {
                ctx.beginPath(); ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, canvas.height); ctx.stroke();
            }
            for (let y = 0; y <= ROWS; y++) {
                ctx.beginPath(); ctx.moveTo(0, y*CELL); ctx.lineTo(canvas.width, y*CELL); ctx.stroke();
            }

            // Draw cells
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    const v = grid[y][x];
                    if (v === 1) {
                        // Player territory
                        ctx.fillStyle = BUNNY_COLOR + 'aa';
                        ctx.fillRect(x*CELL, y*CELL, CELL, CELL);
                    } else if (v === 3) {
                        // Player trail
                        ctx.fillStyle = BUNNY_COLOR;
                        ctx.fillRect(x*CELL, y*CELL, CELL, CELL);
                        ctx.fillStyle = 'rgba(255,255,255,0.3)';
                        ctx.fillRect(x*CELL+2, y*CELL+2, CELL-4, CELL-4);
                    } else if (v >= 10 && v < 20) {
                        // Enemy territory
                        const ei = v - 10;
                        ctx.fillStyle = ENEMY_COLORS[ei].fill + '66';
                        ctx.fillRect(x*CELL, y*CELL, CELL, CELL);
                    } else if (v >= 20) {
                        // Enemy trail
                        const ei = v - 20;
                        ctx.fillStyle = ENEMY_COLORS[ei].trail;
                        ctx.fillRect(x*CELL, y*CELL, CELL, CELL);
                    }
                }
            }

            // Draw enemies
            for (const e of enemies) {
                if (!e.alive) continue;
                ctx.fillStyle = e.color.fill;
                ctx.beginPath();
                ctx.arc(e.x*CELL + CELL/2, e.y*CELL + CELL/2, CELL*0.7, 0, Math.PI*2);
                ctx.fill();
                // Eyes
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(e.x*CELL + CELL/2 - 3, e.y*CELL + CELL/2 - 2, 3, 0, Math.PI*2);
                ctx.arc(e.x*CELL + CELL/2 + 3, e.y*CELL + CELL/2 - 2, 3, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(e.x*CELL + CELL/2 - 2, e.y*CELL + CELL/2 - 2, 1.5, 0, Math.PI*2);
                ctx.arc(e.x*CELL + CELL/2 + 4, e.y*CELL + CELL/2 - 2, 1.5, 0, Math.PI*2);
                ctx.fill();
            }

            // Draw player bunny
            if (player.alive) {
                const px = player.x * CELL;
                const py = player.y * CELL;
                const size = CELL * 2;

                if (bunnyImg.complete && bunnyImg.naturalWidth > 0) {
                    ctx.drawImage(bunnyImg, px - CELL/2, py - CELL/2, size, size);
                } else {
                    // Fallback circle
                    ctx.fillStyle = BUNNY_COLOR;
                    ctx.beginPath();
                    ctx.arc(px + CELL/2, py + CELL/2, CELL*0.8, 0, Math.PI*2);
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                // Direction indicator
                if (player.dir >= 0) {
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.beginPath();
                    const cx = px + CELL/2 + DX[player.dir] * CELL;
                    const cy2 = py + CELL/2 + DY[player.dir] * CELL;
                    ctx.arc(cx, cy2, 3, 0, Math.PI*2);
                    ctx.fill();
                }
            }
        }

        function gameLoop(ts) {
            if (!gameRunning) return;
            if (ts - lastTick >= TICK_MS) {
                tick();
                lastTick = ts;
            }
            draw();
            animId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            overlay.classList.add('hidden');
            initGame();
            updateScore();
            inputDir = -1;
            mouseTarget = null;
            gameRunning = true;
            lastTick = 0;
            animId = requestAnimationFrame(gameLoop);
        }

        playBtn.addEventListener('click', startGame);

        // Initial draw
        initGame();
        draw();
    })();
    </script>
</body>
</html>
